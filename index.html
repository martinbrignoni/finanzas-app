<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Finanzas</title>
    <link rel="manifest" href="/finanzas-app/manifest.webmanifest" />
    <link rel="icon" href="/finanzas-app/icons/favicon-32.png" />
    <link rel="apple-touch-icon" href="/finanzas-app/icons/apple-touch-icon.png" />
    <meta name="theme-color" content="#10181A" />
    <!-- Requisito de iOS para que la app instalada en pantalla de inicio se
         abra en modo standalone (sin barra de Safari) y pueda recibir Web
         Push: https://developer.apple.com/documentation/webkit/delivering-web-push-notifications-in-web-apps-and-browsers -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Finanzas" />
    <script>
      // Evita el flash de fondo blanco/incorrecto antes de que React monte:
      // aplica el color de fondo del modo guardado (o oscuro por defecto)
      // apenas carga el HTML, en sync con src/styles/theme.ts.
      (function () {
        try {
          var mode = localStorage.getItem("finanzas:theme") === "light" ? "light" : "dark";
          document.documentElement.style.background = mode === "light" ? "#F4F1EA" : "#10181A";
          document.documentElement.style.colorScheme = mode;
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
